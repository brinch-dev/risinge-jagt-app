name: jagt_app
description: "Jagt hunting app with Flutter + Supabase"
publish_to: 'none'

version: 2.8.3+71

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.12.1

  # Configuration
  flutter_dotenv: ^6.0.0

  # Location & Maps
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Calendar
  table_calendar: ^3.2.0

  # UI utilities
  intl: ^0.20.0
  gap: ^3.0.1

  # Image/Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Storage
  shared_preferences: ^2.2.3

  # URL
  url_launcher: ^6.3.0

  # Connectivity
  connectivity_plus: ^6.0.6

  # Notifications
  flutter_local_notifications: ^19.0.0

  # HTTP
  http: ^1.2.0

  # Utils
  uuid: ^4.5.1
  timeago: ^3.7.0
  timezone: ^0.10.0
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1
  video_player: ^2.11.1
  open_filex: ^4.7.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
